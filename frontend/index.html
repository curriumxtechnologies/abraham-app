<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#0E2F76" />
    <meta
      name="description"
      content="Hostix - Smart Hostel Management System for Students"
    />

    <!-- Primary Meta Tags -->
    <title>Hostix - Smart Hostel Management</title>
    <meta name="title" content="Hostix - Smart Hostel Management" />
    <meta
      name="description"
      content="Smart hostel allocation and attendance system for students. View available rooms, track attendance with QR codes, and manage complaints."
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Hostix - Smart Hostel Management" />
    <meta
      property="og:description"
      content="Smart hostel allocation and attendance system for students."
    />
    <meta property="og:image" content="/android-chrome-512x512.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Hostix - Smart Hostel Management" />
    <meta
      property="twitter:description"
      content="Smart hostel allocation and attendance system for students."
    />
    <meta property="twitter:image" content="/android-chrome-512x512.png" />

    <!-- Favicon Files -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/favicon.svg" color="#0E2F76" />

    <!-- Android Chrome Icons -->
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/android-chrome-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="/android-chrome-512x512.png"
    />

    <!-- Web App Manifest -->
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Apple Web App Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Hostix" />

    <!-- Microsoft Tiles -->
    <meta name="msapplication-TileColor" content="#0E2F76" />
    <meta
      name="msapplication-TileImage"
      content="/android-chrome-144x144.png"
    />
    <meta name="msapplication-config" content="/browserconfig.xml" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
